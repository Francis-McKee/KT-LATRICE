title: Contact
layout: default

<link rel="stylesheet" href="./css/contact.css">

<section class="contact-hero">
    <h1>Booking & Contact</h1>
    <p>For bookings, collaborations, and appearances, please fill out the form below.</p>
</section>

<section class="contact-form">

    <form action="https://formspree.io/f/YOUR_ID" method="POST">

        <label> Name </label>
        <input type="text" name="name" placeholder="Your name" required>

        <label> Email </label>
        <input type="email" name="email" placeholder="Your email" required>

        <label> Phone </label>
        <input type="tel" name="phone" placeholder="Your phone number">

        <label> Event Type </label>
        <select name="event_type">
            <option> Wedding </option>
            <option> Private Event </option>
            <option> Corporate Event </option>
            <option> Festival </option>
            <option> Other </option>
        </select>

        <label> Event Date </label>
        <input type="date" name="event_date">

        <label> Location </label>
        <input type="text" name="location" placeholder="City, State">

        <label> Message </label>
        <textarea name="message" placeholder="Tell us about your event" required></textarea>

        <input type="hidden" name="_subject" value="New Booking Request - KT LATRICE">

        <button type="submit"> Send Booking Request </button>

    </form>

</section>

<section class="contact-info">
    <p><strong>Managed by Rock Soul Creative</strong></p>
    <p>Email: <a href="mailto:KTLatriceMusic@gmail.com">KTLatriceMusic@gmail.com</a></p>
</section>
